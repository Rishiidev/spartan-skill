name: Validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md exists
        run: test -f skills/spartan/SKILL.md && echo "✓ SKILL.md found"
      - name: Check plugin.json exists
        run: test -f .claude-plugin/plugin.json && echo "✓ plugin.json found"
      - name: Check SKILL.md has frontmatter
        run: head -1 skills/spartan/SKILL.md | grep -q "^---" && echo "✓ frontmatter present"
      - name: Check marketplace.json exists
        run: test -f .claude-plugin/marketplace.json && echo "✓ marketplace.json found"
